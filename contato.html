        <i class="fas fa-bars text-2xl"></i>

      <!-- LINKS -->
      <div
        id="menu"
        class="hidden opacity-0 scale-95 transition-all duration-300 ease-in-out transform

  <main class="flex-grow">

    <!-- CABEÇALHO -->

    <!-- CONTATE-ME WHATS APP LINK E QR CODE -->
      <section class="contact section" id="contact">
        <div class="contact__container container grid whatsapp-contact">
          <div class="qr__wrapper">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://wa.me/5535997629116" alt="QR Code WhatsApp" class="qr__code"/>
              <p class="qr__text">
                Scan the QR Code to call me on WhatsApp 📱
              </p>
            </div>
              <a href="https://wa.me/5535997629116?text=Hello%2C%20I%20would%20like%20to%20talk%20about%20the%20Hellforge%21" target="_blank" rel="noopener noreferrer" class="button contact__button whatsapp__button">
                💬 Contact me
              </a>
          </div>
        </section>
  </main>
